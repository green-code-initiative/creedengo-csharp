name: Versioning

on:
  workflow_call:
    outputs:
      tag:
        value: ${{ jobs.versioning.outputs.tag }}
      version:
        value: ${{ jobs.versioning.outputs.version }}
      versionPrefix:
        value: ${{ jobs.versioning.outputs.versionPrefix }}
      versionSuffix:
        value: ${{ jobs.versioning.outputs.versionSuffix }}

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.versioning.outputs.tag }}                       # full SemVer (e.g. 2.2.0 or 2.2.0-beta1) — used to find published nupkg files
      version: ${{ steps.versioning.outputs.version }}               # numeric stem (e.g. 2.2.0) — alias of versionPrefix, kept for compatibility
      versionPrefix: ${{ steps.versioning.outputs.versionPrefix }}   # numeric stem (e.g. 2.2.0)        — fed to -p:VersionPrefix
      versionSuffix: ${{ steps.versioning.outputs.versionSuffix }}   # pre-release tail (e.g. beta1) or empty — fed to -p:VersionSuffix
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Necessary to fetch tags

    - id: versioning
      run: |
        TAG=${GITHUB_REF#refs/tags/}

        TAG_COMMIT=$(git rev-list -n 1 $TAG)
        MAIN_BRANCH_COMMIT=$(git rev-parse origin/${{ github.event.repository.default_branch }})
        if ! git merge-base --is-ancestor $TAG_COMMIT $MAIN_BRANCH_COMMIT; then
          echo "Tag is not on the main branch, stopping workflow."
          exit 1
        fi

        if [[ $TAG =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-(beta[0-9]+))?$ ]]; then
          PREFIX="${BASH_REMATCH[1]}"
          SUFFIX="${BASH_REMATCH[3]}"  # empty for stable tags, e.g. "beta1" for 2.2.0-beta1
          {
            echo "tag=$TAG"
            echo "version=$PREFIX"
            echo "versionPrefix=$PREFIX"
            echo "versionSuffix=$SUFFIX"
          } >> $GITHUB_OUTPUT
        else
          echo "Error: Tag does not match the expected format 'X.Y.Z' or 'X.Y.Z-betaN'"
          exit 1
        fi

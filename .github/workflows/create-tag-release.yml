name: Create tag release
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-beta[0-9]+'

permissions:
  actions: write
  contents: write

# Serialize tag releases. Parallel pushes (e.g. quick re-tagging) would otherwise race on `dotnet nuget push`.
# cancel-in-progress: false — never abort an in-flight publish; queue the second tag and let it run after.
concurrency:
  group: create-tag-release
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  versioning:
    uses: ./.github/workflows/01-versioning.yml

  build:
    needs: versioning
    uses: ./.github/workflows/02-build.yml
    with:
      versionPrefix: ${{ needs.versioning.outputs.versionPrefix }}
      versionSuffix: ${{ needs.versioning.outputs.versionSuffix }}

  publish:
    needs: [versioning, build]
    uses: ./.github/workflows/03-publish.yml
    with:
      tag: ${{ needs.versioning.outputs.tag }}
    secrets:
      nuget-api-key: ${{ secrets.NUGET_API_KEY }}

  release:
    needs: publish
    uses: ./.github/workflows/04-release.yml
    with:
      tag: ${{ needs.versioning.outputs.tag }}
      version: ${{ needs.versioning.outputs.version }}

name: Build

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  build-nuget:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - run: dotnet restore NuGetOnly.slnf

    - run: dotnet build NuGetOnly.slnf -c Release --no-restore -p:Version=${{ inputs.tag }}

    - run: dotnet pack NuGetOnly.slnf -c Release --no-build -o ./nupkg -p:Version=${{ inputs.tag }}

    - uses: actions/upload-artifact@v7
      with:
        name: nupkg
        path: nupkg/*.nupkg

  build-tool:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - run: dotnet restore ToolOnly.slnf

    - run: dotnet build ToolOnly.slnf -c Release --no-restore -p:Version=${{ inputs.tag }}

    - run: dotnet pack ToolOnly.slnf -c Release -o ./tool -p:Version=${{ inputs.tag }}

    - uses: actions/upload-artifact@v7
      with:
        name: tool
        path: tool/*.nupkg
